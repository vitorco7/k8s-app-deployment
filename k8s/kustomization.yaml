apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

images:
  - name: vco7/k8s-app-deployment
    newTag: 1.0.2

secretGenerator:
  - name: app-db-credentials
    namespace: k8s-app
    envs:
      - app/secret.env
    options:
      disableNameSuffixHash: true
  - name: mysql-credentials
    namespace: k8s-app
    envs:
      - mysql/secret.env
    options:
      disableNameSuffixHash: true
  - name: registry-credentials
    namespace: k8s-app
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson=app/registry-credentials.json
    options:
      disableNameSuffixHash: true

resources:
  - namespace.yaml
  - app/configmap.yaml
  - mysql/service.yaml
  - mysql/statefulset.yaml
  - app/service.yaml
  - app/poddisruptionbudget.yaml
  - app/deployment.yaml
  - app/ingress.yaml
